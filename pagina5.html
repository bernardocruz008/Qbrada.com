<main>
    <h1>Tem vontade de apoiar o projeto?</h1>
    <h2>Se você acredita em nossa missão, estamos sempre em busca de apoiadores.</h2>
    <form class="box">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br><br>
        <label for="valor">Valor do apoio (R$):</label>
        <input type="number" id="valor" name="valor" step="0.01" required>
        <br><br>
          <label for="data_nascimento"><b>Data de Nascimento:</b></label>
                <input type="date" name="data_nascimento" id="data_nascimento" required>
                <br><br>
 
                <div class="inputBox">
                      <label for="estado" class="labelInput">Estado:</label>
                    <input type="text" name="estado" id="estado" class="inputUser" required>
             
                </div>
                <br><br>
                <div class="inputBox">
                     <label for="cidade" class="labelInput">Cidade:</label>
                    <input type="text" name="cidade" id="cidade" class="inputUser" required>
                </div>
                <br><br>
                <div class="inputBox">
                      <label for="endereco" class="labelInput">Endereço:</label>
                    <input type="text" name="endereco" id="endereco" class="inputUser" required>
                
                </div>
                <input type="submit" value="Apoiar" class="btn">
    </form>

    <img src="/img/Q Brada Marca e Grafismo-03.png" alt="" height="500px" width="1100px";>
